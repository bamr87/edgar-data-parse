[project]
name = "fredgar-ai"
version = "0.1.0"
description = "Fredgar AI (FRED + EDGAR, with AI) — Django + DRF backend for SEC EDGAR company data and FRED macro series with a Vite/React UI"
requires-python = ">=3.12"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings_test"
pythonpath = ["src"]
testpaths = ["tests"]
addopts = [
    "--strict-markers",
    "-ra",
]
markers = [
    "slow: slow tests (not selected by default in CI if you filter)",
    "integration: hits DB or multiple layers",
    "requires_network: needs live network (excluded from CI)",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/manage.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/migrations/**" = ["ALL"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = true
# Advisory only (CI runs it non-blocking). Migrations are autogenerated.
exclude = '/migrations/'

[tool.django-stubs]
django_settings_module = "config.settings_test"
