# Pre-commit hooks mirroring CI (ruff + migration check).
# Install once:  pre-commit install
# Run on all:    pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests)/
      - id: ruff-format
        files: ^(src|tests)/

  - repo: local
    hooks:
      # Mirrors ci.yml django-migrations job (makemigrations --check --dry-run).
      - id: django-makemigrations-check
        name: django makemigrations --check
        entry: python src/manage.py makemigrations --check --dry-run
        language: system
        pass_filenames: false
        files: ^src/.*/(models|migrations)/.*\.py$|^src/.*/models\.py$
        env:
          PYTHONPATH: src
          DJANGO_SETTINGS_MODULE: config.settings_test
