name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, test and build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install ruff
      - run: ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until the codebase is fully typed
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Mypy (advisory)
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: mypy src

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true   # non-blocking advisory scan
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pip-audit (advisory)
        run: pip-audit

  django-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Check for missing migrations
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings
        run: python src/manage.py makemigrations --check --dry-run

  deploy-check:
    runs-on: ubuntu-latest
    needs: [lint, django-migrations]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: manage.py check --deploy (production settings)
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: "false"
          # A 50+ char key so security.W009 does not warn; not a real secret.
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-0123456789-abcdefghij"
          DJANGO_ALLOWED_HOSTS: "example.com"
        run: python src/manage.py check --deploy --fail-level WARNING

  test-sqlite:
    runs-on: ubuntu-latest
    needs: [lint, django-migrations]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Django system check
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: python src/manage.py check
      - name: Pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: |
          pytest \
            --cov=warehouse --cov=config --cov=sec_edgar --cov=public_data \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  test-postgres:
    runs-on: ubuntu-latest
    needs: [lint, django-migrations]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_fredgar
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_fredgar"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_fredgar
      PYTHONPATH: ${{ github.workspace }}/src
      DJANGO_SETTINGS_MODULE: config.settings_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python src/manage.py migrate --noinput
      - run: |
          pytest -q \
            --cov=warehouse --cov=config --cov=sec_edgar --cov=public_data \
            --cov=api \
            --cov-fail-under=50
