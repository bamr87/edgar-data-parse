name: Release

# Scaffolded by tools/adopt-release.sh — Conventional Commits drive release-please
# (opens a release PR that bumps the version + CHANGELOG); merging it tags, releases,
# and publishes. Shared logic lives in bamr87/.github. See release-please-config.json.

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: bamr87/.github/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  publish:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: bamr87/.github/.github/workflows/publish.yml@main
    with:
      tag: ${{ needs.release.outputs.tag_name }}
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: write
      packages: write
      id-token: write
    secrets: inherit
